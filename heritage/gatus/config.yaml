web:
  port: 8088

storage:
  type: sqlite
  path: /data/gatus.db

ui:
  title: "Heritage Status"
  header: "Heritage Services Health"

endpoints:
  # --- Infrastructure ---
  - name: Homepage
    group: Infrastructure
    url: "http://localhost:3000"
    interval: 1m
    conditions:
      - "[STATUS] == 200"

  - name: Beszel
    group: Infrastructure
    url: "http://localhost:8090"
    interval: 1m
    conditions:
      - "[STATUS] == 200"

  # --- Services ---
  - name: Transmission
    group: Services
    url: "http://localhost:8091/transmission/web/"
    interval: 1m
    conditions:
      - "[STATUS] == 200"

  # --- Streaming ---
  - name: Jellyfin
    group: Streaming
    url: "http://localhost:8096/jellyfin/health"
    interval: 1m
    conditions:
      - "[STATUS] == 200"
