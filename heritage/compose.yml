services:
  # --- L7 Reverse Proxy ---
  traefik:
    image: traefik:v3
    container_name: traefik
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro

  # --- Dashboard ---
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    env_file:
      - .env
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Ho_Chi_Minh
      - HOMEPAGE_ALLOWED_HOSTS=*
    volumes:
      - ./homepage/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/host:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro

  # --- Download ---
  transmission:
    image: lscr.io/linuxserver/transmission:latest
    container_name: transmission
    restart: unless-stopped
    ports:
      - "8091:9091"
      - "51413:51413"
      - "51413:51413/udp"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - ./transmission/config:/config
      - ./transmission/data:/data
      - /mnt/data2/torrent/downloads:/downloads
      - /mnt/data1/torrent/complete:/downloads/complete
      - /mnt/data2/torrent/downloads/watch:/watch
    mem_limit: 512m

  # --- Monitoring ---
  gatus:
    image: twinproduction/gatus:latest
    container_name: gatus
    restart: unless-stopped
    ports:
      - "8088:8088"
    volumes:
      - ./gatus/config.yaml:/config/config.yaml:ro
      - ./gatus/data:/data
    environment:
      - TZ=Asia/Ho_Chi_Minh

  beszel:
    image: docker.io/henrygd/beszel:latest
    container_name: beszel-hub
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - ./beszel/data:/beszel_data
      - ./beszel/socket:/beszel_socket
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - APP_URL=https://heritage.bun-bull.ts.net/beszel

  # --- Streaming ---
  jellyfin:
    image: docker.io/jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    ports:
      - "8096:8096"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Ho_Chi_Minh
      - JELLYFIN_BaseUrl=
    volumes:
      - ./jellyfin/config:/config
      - ./jellyfin/cache:/cache
      - /mnt/data2/torrent/downloads:/data1
      - /mnt/data1/torrent/complete:/data2
    mem_limit: 2g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
