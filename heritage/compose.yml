services:
  # --- L7 Reverse Proxy ---
  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  # --- Dashboard ---
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    env_file:
      - .env
    network_mode: host
    environment:
      - PUID=1000
      - PGID=996
      - TZ=Asia/Seoul
      - HOMEPAGE_ALLOWED_HOSTS=*
    volumes:
      - ./homepage/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/host:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro

  # --- Download ---
  transmission:
    image: lscr.io/linuxserver/transmission:latest
    container_name: transmission
    restart: unless-stopped
    ports:
      - "8091:9091"
      - "51413:51413"
      - "51413:51413/udp"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Seoul
    volumes:
      - ./transmission/config:/config
      - ./transmission/data:/data
      - /mnt/data2/torrent/downloads:/downloads
      - /mnt/data1/torrent/complete:/downloads/complete
      - /mnt/data2/torrent/downloads/watch:/watch
    mem_limit: 512m

  # --- Monitoring ---
#   gatus:
#     image: twinproduction/gatus:latest
#     container_name: gatus
#     restart: unless-stopped
#     network_mode: host
#     volumes:
#       - ./gatus/config.yaml:/config/config.yaml:ro
#       - ./gatus/data:/data
#     environment:
#       - TZ=Asia/Seoul
#
#   beszel:
#     image: docker.io/henrygd/beszel:latest
#     container_name: beszel-hub
#     restart: unless-stopped
#     ports:
#       - "8090:8090"
#     volumes:
#       - ./beszel/data:/beszel_data
#       - ./beszel/socket:/beszel_socket
#     environment:
#       - TZ=Asia/Seoul
#       - APP_URL=https://heritage.bun-bull.ts.net/beszel
#
  # --- Streaming ---
  jellyfin:
    image: docker.io/jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    ports:
      - "8096:8096"
    user: "1000:1000"
    environment:
      - TZ=Asia/Seoul
      - JELLYFIN_BaseUrl=
    volumes:
      - ./jellyfin/config:/config
      - ./jellyfin/cache:/cache
      - /mnt/data2/torrent/downloads:/data1
      - /mnt/data1/torrent/complete:/data2
    mem_limit: 2g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # --- Download Manager ---
  aria2:
    image: p3terx/aria2-pro:test
    container_name: aria2
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK_SET=022
      # - RPC_SECRET=${ARIA2_RPC_SECRET}
      - RPC_PORT=6800
      - LISTEN_PORT=6888
      - DISK_CACHE=64M
      - IPV6_MODE=false
      - UPDATE_TRACKERS=false
      - TZ=Asia/Seoul
    ports:
      - "6800:6800"
      - "6888:6888"
      - "6888:6888/udp"
    volumes:
      - aria2-config:/config
      - /mnt/data2/downloads:/downloads:rw
    networks:
      - heritage
    logging:
      driver: json-file
      options:
        max-size: 1m
volumes:
  aria2-config:
  caddy_data:
  caddy_config:

networks:
  heritage:
