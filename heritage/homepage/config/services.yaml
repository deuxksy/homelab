- Info:
    - Calendar:
        widget:
          type: calendar
          firstDayInWeek: sunday
          view: monthly
          timezone: Asia/Seoul
          integrations:
            - type: ical
              url: https://calendar.google.com/calendar/ical/deuxksy%40gmail.com/public/basic.ics
              name: Google Calendar
              color: amber
    - Stocks:
        widget:
          type: stocks
          provider: finnhub
          watchlist:
            - EWY
            - SPY
            - QQQ
            - ASHR
            - KSTR
            - EWJ
            - INDY
            - VNM
            - FEZ

    - Agenda:
        widget:
          type: calendar
          view: agenda
          maxEvents: 10
          showTime: true
          previousDays: 3
          integrations:
            - type: ical
              url: https://calendar.google.com/calendar/ical/deuxksy%40gmail.com/public/basic.ics
              name: Google Calendar
              color: amber

- Monitoring:
    - Cockpit:
        label: "Server Console"
        icon: mdi-console-network
        href: https://moni.bun-bull.ts.net:9090
        description: moni VM 102 - systemd web console

    - PatchMon:
        label: "Patch Monitor"
        icon: mdi-shield-update
        href: https://moni.bun-bull.ts.net:8443
        description: moni VM 102 - 패치 모니터링
        server: moni-docker
        container: patchmon-server-1

    - Pulse:
        label: "Unified Monitor"
        icon: mdi-pulse
        href: https://moni.bun-bull.ts.net:10000
        description: moni VM 102 - 통합 모니터링
        server: moni-docker
        container: pulse-pulse-1

- Download:
    - Transmission:
        label: "Torrent Node"
        icon: transmission.png
        href: https://heritage.bun-bull.ts.net/transmission/web/
        server: my-docker
        container: transmission
        widget:
          type: transmission
          url: http://localhost:8091

    - Aria2:
        label: "Download Manager"
        icon: mdi-download
        server: my-docker
        container: aria2

- Streaming:
    - Jellyfin:
        label: "Media Server"
        icon: jellyfin.png
        href: https://heritage.bun-bull.ts.net/jellyfin
        server: my-docker
        container: jellyfin
        widget:
          type: jellyfin
          url: http://localhost:8096/jellyfin
          key: {{HOMEPAGE_VAR_KEY_JELLYFIN}}
          version: 2
          enableBlocks: true
          enableNowPlaying: true
          enableUser: true
          showEpisodeNumber: true
          expandOneStreamToTwoRows: false
