---
- name: Deploy heritage media server
  hosts: heritage_hosts
  gather_facts: true
  vars:
    heritage_dir: /opt/heritage

  tasks:
    # --- System packages ---
    - name: Install dependencies
      ansible.builtin.apt:
        name:
          - curl
          - git
          - ca-certificates
          - gnupg
          - rsync
        state: present
        update_cache: true

    # --- Tailscale (LXC 호스트에 직접 설치) ---
    - name: Install Tailscale
      ansible.builtin.shell:
        cmd: curl -fsSL https://tailscale.com/install.sh | sh
        creates: /usr/bin/tailscaled

    - name: Enable tailscaled
      ansible.builtin.systemd:
        name: tailscaled
        state: started
        enabled: true

    - name: Check Tailscale status
      ansible.builtin.command: tailscale status --json
      register: ts_status
      changed_when: false
      failed_when: false

    - name: Connect to Tailscale
      ansible.builtin.shell:
        cmd: tailscale up --authkey={{ ts_authkey }} --hostname=heritage --accept-dns=true
      when:
        - ts_authkey is defined
        - ts_status.rc != 0
      no_log: true

    - name: Configure Tailscale Serve
      ansible.builtin.shell:
        cmd: |
          tailscale serve reset
          tailscale serve --bg --set-path / 9080
      changed_when: true

    # --- Docker ---
    - name: Add Docker GPG key
      ansible.builtin.shell:
        cmd: |
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
          chmod a+r /etc/apt/keyrings/docker.asc
      changed_when: true

    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') }}
          signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/debian
          {{ ansible_distribution_release }} stable
        state: present
        update_cache: true

    - name: Install Docker
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present

    # --- Heritage 배포 ---
    - name: Create heritage directory
      ansible.builtin.file:
        path: "{{ heritage_dir }}"
        state: directory
        mode: "0755"

    - name: Deploy heritage configs
      ansible.posix.synchronize:
        src: "{{ playbook_dir }}/../../../heritage/"
        dest: "{{ heritage_dir }}/"
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=.env"
          - "--exclude=beszel/data"
          - "--exclude=gatus/data"
          - "--exclude=jellyfin/cache"
          - "--exclude=transmission/data"

    - name: Decrypt .env.sops locally
      ansible.builtin.shell:
        cmd: sops -d --input-type binary --output-type binary {{ playbook_dir }}/../../../heritage/.env.sops > /tmp/heritage.env
      delegate_to: localhost
      changed_when: true
      no_log: true

    - name: Deploy .env to heritage
      ansible.builtin.copy:
        src: /tmp/heritage.env
        dest: "{{ heritage_dir }}/.env"
        mode: "0600"
      no_log: true

    - name: Clean up local temp .env
      ansible.builtin.file:
        path: /tmp/heritage.env
        state: absent
      delegate_to: localhost
      changed_when: true

    # --- 서비스 시작 ---
    - name: Start heritage services
      community.docker.docker_compose_v2:
        project_src: "{{ heritage_dir }}"
        state: present
      environment:
        DOCKER_HOST: unix:///run/docker.sock

    - name: Wait for services
      ansible.builtin.pause:
        seconds: 30

    - name: Verify Jellyfin is responding
      ansible.builtin.uri:
        url: "http://localhost:8096/health"
        status_code: 200
        timeout: 10
      register: health
      until: health.status == 200
      retries: 5
      delay: 10
