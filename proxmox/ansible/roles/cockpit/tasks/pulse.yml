---
# Pulse Compose 배포
# 의존성: docker.yml(Docker Engine)
# B1(Codex): 인증 env preseed 없음 — UI setup wizard로 초기화

- name: Pulse 배포 디렉토리
  ansible.builtin.file:
    path: "{{ cockpit_pulse_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: docker-compose.yml 배포
  ansible.builtin.template:
    src: pulse-docker-compose.yml.j2
    dest: "{{ cockpit_pulse_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"

# B1: .env 파일 생성 안 함 — environment 블록에 비민감 설정만 (template 내)

- name: Pulse Compose 기동 (healthcheck 대기)
  community.docker.docker_compose_v2:
    project_src: "{{ cockpit_pulse_dir }}"
    state: present
    wait: true
  register: pulse_compose

- name: Pulse 컨테이너 상태 확인
  ansible.builtin.assert:
    that:
      - pulse_compose.containers | length == 1
    fail_msg: "Pulse 컨테이너 기동 실패 (단일 컨테이너 예상)"
