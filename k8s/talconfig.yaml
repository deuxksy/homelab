clusterName: homelab
talosVersion: v1.10
kubernetesVersion: v1.32.5
endpoint: https://192.168.221.172:6443

nodes:
  - hostname: talos-master
    ipAddress: 192.168.221.172
    controlPlane: true
    installDiskSelector:
      size: "<= 20GB"
    machineSpec:
      mode: metal
  - hostname: talos-worker
    ipAddress: 192.168.221.184
    controlPlane: false
    installDiskSelector:
      size: "<= 30GB"
    machineSpec:
      mode: metal

worker:
  nodeLabels:
    node-role.kubernetes.io/worker: ""
